name: Build/Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies (Skip yt-dlp download)
        run: npm install
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Manual Download yt-dlp (macOS Universal)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          # 모든 맥에서 돌아가는 범용 바이너리 다운로드
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o node_modules/youtube-dl-exec/bin/yt-dlp
          chmod +x node_modules/youtube-dl-exec/bin/yt-dlp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Manual Download yt-dlp (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o node_modules/youtube-dl-exec/bin/yt-dlp.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build App
        run: npm run build

      - name: Build for macOS (Universal)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
